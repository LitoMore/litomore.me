<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pager UI</title>
  <style>
    :root {
      color-scheme: dark;
      --page-bg: #101214;
      --shell: #24282c;
      --shell-edge: #111315;
      --shell-hi: #3c4248;
      --screen: #b6c77b;
      --screen-dark: #1a241b;
      --screen-mid: #3d4a28;
      --amber: #ffb84d;
      --red: #e85b5b;
      --blue: #4c84b7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--shell-edge);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .scene {
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
    }

    .pager {
      position: relative;
      display: grid;
      grid-template-rows: 0.24fr 1fr 0.38fr;
      gap: clamp(5px, 1.5vmin, 16px);
      width: 100vw;
      height: 100vh;
      padding: clamp(10px, 3.2vmin, 34px);
      border: clamp(2px, 0.7vmin, 8px) solid var(--shell-edge);
      border-radius: 0;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgb(255 255 255 / 0.16), transparent 18%),
        linear-gradient(315deg, rgb(0 0 0 / 0.38), transparent 28%),
        linear-gradient(180deg, var(--shell-hi), var(--shell) 38%, #181b1e);
      box-shadow:
        inset 0 clamp(2px, 0.7vmin, 8px) clamp(2px, 1vmin, 12px) rgb(255 255 255 / 0.08),
        inset 0 clamp(-16px, -3vmin, -6px) clamp(8px, 2.2vmin, 22px) rgb(0 0 0 / 0.42);
    }

    .pager::before {
      content: "";
      position: absolute;
      inset: clamp(5px, 1.2vmin, 14px);
      pointer-events: none;
      border: 1px solid rgb(255 255 255 / 0.08);
      border-radius: clamp(13px, 4.7vmin, 38px);
    }

    .top-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: clamp(8px, 2vmin, 22px);
      min-height: 0;
    }

    .brand {
      min-width: 0;
      color: #e8ecec;
      font-size: clamp(10px, 3.2vmin, 30px);
      font-weight: 800;
      letter-spacing: 0;
      line-height: 1;
      text-shadow: 0 1px 1px rgb(0 0 0 / 0.8);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: clamp(4px, 1.2vmin, 11px);
      min-width: 0;
    }

    .led {
      width: clamp(6px, 1.8vmin, 17px);
      aspect-ratio: 1;
      border-radius: 999px;
      background: var(--amber);
      box-shadow:
        0 0 clamp(4px, 1.2vmin, 12px) var(--amber),
        inset 0 1px 2px rgb(255 255 255 / 0.45);
    }

    .model {
      color: #c7d0d0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: clamp(6px, 1.9vmin, 17px);
      font-weight: 700;
      line-height: 1;
      opacity: 0.78;
      white-space: nowrap;
    }

    .screen-frame {
      min-height: 0;
      padding: clamp(6px, 1.8vmin, 18px);
      border-radius: clamp(10px, 3vmin, 28px);
      background:
        linear-gradient(180deg, rgb(0 0 0 / 0.72), rgb(255 255 255 / 0.05)),
        #0c0e10;
      box-shadow:
        inset 0 clamp(3px, 1vmin, 10px) clamp(5px, 1.8vmin, 18px) rgb(0 0 0 / 0.72),
        inset 0 -1px 0 rgb(255 255 255 / 0.08);
    }

    .screen {
      position: relative;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100%;
      min-height: 0;
      padding: clamp(7px, 2.1vmin, 22px);
      overflow: hidden;
      border: clamp(1px, 0.35vmin, 4px) solid rgb(255 255 255 / 0.12);
      border-radius: clamp(7px, 2vmin, 18px);
      background:
        linear-gradient(90deg, rgb(255 255 255 / 0.12) 0 1px, transparent 1px 100%),
        linear-gradient(180deg, rgb(255 255 255 / 0.09) 0 1px, transparent 1px 100%),
        linear-gradient(160deg, #d0d990, var(--screen) 52%, #879957);
      background-size:
        clamp(5px, 1.2vmin, 12px) clamp(5px, 1.2vmin, 12px),
        clamp(5px, 1.2vmin, 12px) clamp(5px, 1.2vmin, 12px),
        auto;
      box-shadow:
        inset 0 clamp(2px, 0.8vmin, 8px) clamp(4px, 1.4vmin, 14px) rgb(255 255 255 / 0.26),
        inset 0 clamp(-6px, -1.6vmin, -2px) clamp(6px, 1.8vmin, 18px) rgb(46 61 24 / 0.38);
      color: var(--screen-dark);
      font-family: "Courier New", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(110deg, transparent 8%, rgb(255 255 255 / 0.18) 21%, transparent 38%);
      mix-blend-mode: soft-light;
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: clamp(6px, 1.5vmin, 16px);
      min-width: 0;
      font-size: clamp(7px, 2.3vmin, 21px);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: clamp(5px, 1.3vmin, 12px);
      white-space: nowrap;
    }

    .signal {
      display: inline-grid;
      grid-auto-flow: column;
      align-items: end;
      gap: clamp(1px, 0.4vmin, 4px);
      height: clamp(8px, 2.2vmin, 20px);
    }

    .signal i {
      display: block;
      width: clamp(2px, 0.65vmin, 6px);
      background: var(--screen-dark);
      border-radius: 1px 1px 0 0;
      opacity: 0.82;
    }

    .signal i:nth-child(1) { height: 35%; }
    .signal i:nth-child(2) { height: 55%; }
    .signal i:nth-child(3) { height: 78%; }
    .signal i:nth-child(4) { height: 100%; }

    .message {
      align-self: center;
      min-width: 0;
      font-size: clamp(13px, 6.1vmin, 58px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
      text-shadow: 0 1px 0 rgb(255 255 255 / 0.18);
    }

    .meta {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: clamp(7px, 1.7vmin, 18px);
      min-width: 0;
      color: var(--screen-mid);
      font-size: clamp(7px, 2.1vmin, 19px);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
    }

    .meta span {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: grid;
      grid-template-columns: 0.7fr 1fr 0.7fr;
      align-items: center;
      gap: clamp(7px, 2vmin, 21px);
      min-height: 0;
    }

    .speaker {
      display: grid;
      gap: clamp(3px, 0.8vmin, 8px);
      align-content: center;
      height: 100%;
      opacity: 0.72;
    }

    .speaker span {
      display: block;
      height: clamp(2px, 0.55vmin, 5px);
      border-radius: 999px;
      background: linear-gradient(90deg, #08090a, #2f3539 42%, #08090a);
      box-shadow: 0 1px 0 rgb(255 255 255 / 0.07);
    }

    .buttons {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 2.4vmin, 26px);
      min-width: 0;
    }

    .button {
      display: grid;
      place-items: center;
      width: clamp(28px, 9vmin, 84px);
      aspect-ratio: 1;
      border: clamp(1px, 0.4vmin, 4px) solid #070809;
      border-radius: 999px;
      background:
        radial-gradient(circle at 34% 28%, rgb(255 255 255 / 0.34), transparent 16%),
        linear-gradient(180deg, #5b6267, #202428 62%, #101214);
      box-shadow:
        inset 0 1px 0 rgb(255 255 255 / 0.22),
        inset 0 clamp(-5px, -1.4vmin, -2px) clamp(5px, 1.4vmin, 14px) rgb(0 0 0 / 0.7),
        0 clamp(2px, 0.8vmin, 8px) clamp(3px, 1vmin, 10px) rgb(0 0 0 / 0.45);
    }

    .button svg {
      width: 45%;
      height: 45%;
      fill: #d7dddc;
      filter: drop-shadow(0 1px 1px rgb(0 0 0 / 0.7));
      opacity: 0.86;
    }

    .side-label {
      justify-self: end;
      color: #cbd0ce;
      font-size: clamp(6px, 1.7vmin, 15px);
      font-weight: 800;
      line-height: 1.05;
      text-align: right;
      text-transform: uppercase;
      opacity: 0.74;
    }

    .clip {
      position: absolute;
      top: 0;
      left: 50%;
      width: 30%;
      height: clamp(7px, 2vmin, 18px);
      transform: translateX(-50%);
      border-radius: 999px 999px clamp(3px, 0.8vmin, 8px) clamp(3px, 0.8vmin, 8px);
      background: linear-gradient(180deg, #343a3f, #151719);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.13);
    }

    @media (max-aspect-ratio: 1 / 1) {
      .pager {
        grid-template-rows: 0.2fr 1fr 0.34fr;
      }

      .screen {
        padding: clamp(8px, 2.8vmin, 20px);
      }

      .message {
        font-size: clamp(14px, 6.3vmin, 44px);
      }

      .side-label {
        display: none;
      }

      .controls {
        grid-template-columns: 0.8fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="scene" aria-label="Pager preview">
    <section class="pager" aria-label="Beeper">
      <div class="clip" aria-hidden="true"></div>

      <header class="top-bar">
        <div class="brand" id="brand">BEEP MINI</div>
        <div class="badge-row">
          <span class="led" aria-hidden="true"></span>
          <span class="model" id="model">BB-02</span>
        </div>
      </header>

      <div class="screen-frame">
        <div class="screen">
          <div class="status">
            <span id="from">MARS HQ</span>
            <span class="status-icons" aria-hidden="true">
              <span class="signal"><i></i><i></i><i></i><i></i></span>
              <span id="time">08:42</span>
            </span>
          </div>

          <div class="message" id="message">CALL ME BACK</div>

          <div class="meta">
            <span id="code">MSG 001</span>
            <span id="date">06.02</span>
          </div>
        </div>
      </div>

      <footer class="controls" aria-hidden="true">
        <div class="speaker">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="buttons">
          <span class="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 11h10v2H7z"></path>
            </svg>
          </span>
          <span class="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5l7 7-7 7-1.4-1.4 4.6-4.6H5v-2h10.2l-4.6-4.6z"></path>
            </svg>
          </span>
          <span class="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M11 5h2v14h-2zM5 11h14v2H5z"></path>
            </svg>
          </span>
        </div>
        <div class="side-label">Alert<br>Memory</div>
      </footer>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fields = ["brand", "model", "from", "time", "message", "code", "date"];

    for (const field of fields) {
      const value = params.get(field);
      if (value) {
        document.getElementById(field).textContent = value;
      }
    }
  </script>
</body>
</html>
